<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TopFun.gg | Checkout Canceled</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #070707;
      color: #f5f5f5;
      padding: 1rem;
    }

    .card {
      width: min(560px, 100%);
      border: 1px solid #2d2d2d;
      border-radius: 14px;
      padding: 1.2rem;
      background: #121212;
    }

    h1 { margin: 0; }
    p { color: #b8b8b8; }

    a {
      display: inline-block;
      margin-top: 0.8rem;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      background: #9f1021;
      border-radius: 10px;
      padding: 0.7rem 0.95rem;
    }

    .legal-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 0.85rem;
      font-size: 0.9rem;
    }

    .legal-links a {
      margin-top: 0;
      background: transparent;
      border: 0;
      padding: 0;
      color: #cfcfcf;
      font-weight: 600;
    }

    .legal-links a:hover { color: #fff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Checkout Canceled</h1>
    <p>No payment was completed. You can return to the site and try again anytime.</p>
    <a href="/">Back to topfun.gg</a>
    <div class="legal-links">
      <a href="/terms.html">Terms</a>
      <a href="/privacy.html">Privacy</a>
      <a href="/refunds.html">Refunds</a>
      <a href="/#checkout">Cancel Subscription</a>

</body>
</html>
